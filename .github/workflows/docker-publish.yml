name: Build & Publish Docker Images to GHCR

on:
  push:
      branches:
            - main
                paths:
                      - 'apps/admin-portal/**'
                            - 'apps/client-portal/**'
                                  - 'apps/designer-portal/**'
                                        - 'services/aesthete-engine/**'
                                              - 'services/media/**'
                                                    - 'services/orders/**'
                                                          - 'services/projects/**'
                                                                - '.github/workflows/docker-publish.yml'
                                                                  workflow_dispatch:
                                                                      inputs:
                                                                            service:
                                                                                    description: 'Specific service to build (leave empty to build all)'
                                                                                            required: false
                                                                                                    default: ''
                                                                                                    
                                                                                                    env:
                                                                                                      REGISTRY: ghcr.io
                                                                                                        IMAGE_PREFIX: ghcr.io/kodeman
                                                                                                        
                                                                                                        jobs:
                                                                                                          # ---------------------------------------------------------------------------
                                                                                                            # Detect which apps/services changed (for push-triggered runs)
                                                                                                              # ---------------------------------------------------------------------------
                                                                                                                changes:
                                                                                                                    runs-on: ubuntu-latest
                                                                                                                        outputs:
                                                                                                                              admin-portal: ${{ steps.filter.outputs.admin-portal }}
                                                                                                                                    client-portal: ${{ steps.filter.outputs.client-portal }}
                                                                                                                                          designer-portal: ${{ steps.filter.outputs.designer-portal }}
                                                                                                                                                aesthete-engine: ${{ steps.filter.outputs.aesthete-engine }}
                                                                                                                                                      media: ${{ steps.filter.outputs.media }}
                                                                                                                                                            orders: ${{ steps.filter.outputs.orders }}
                                                                                                                                                                  projects: ${{ steps.filter.outputs.projects }}
                                                                                                                                                                      steps:
                                                                                                                                                                            - uses: actions/checkout@v4
                                                                                                                                                                            
                                                                                                                                                                                  - uses: dorny/paths-filter@v3
                                                                                                                                                                                          id: filter
                                                                                                                                                                                                  with:
                                                                                                                                                                                                            filters: |
                                                                                                                                                                                                                        admin-portal:
                                                                                                                                                                                                                                      - 'apps/admin-portal/**'
                                                                                                                                                                                                                                                  client-portal:
                                                                                                                                                                                                                                                                - 'apps/client-portal/**'
                                                                                                                                                                                                                                                                            designer-portal:
                                                                                                                                                                                                                                                                                          - 'apps/designer-portal/**'
                                                                                                                                                                                                                                                                                                      aesthete-engine:
                                                                                                                                                                                                                                                                                                                    - 'services/aesthete-engine/**'
                                                                                                                                                                                                                                                                                                                                media:
                                                                                                                                                                                                                                                                                                                                              - 'services/media/**'
                                                                                                                                                                                                                                                                                                                                                          orders:
                                                                                                                                                                                                                                                                                                                                                                        - 'services/orders/**'
                                                                                                                                                                                                                                                                                                                                                                                    projects:
                                                                                                                                                                                                                                                                                                                                                                                                  - 'services/projects/**'
                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                    # ---------------------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                      # Reusable build job — called once per service
                                                                                                                                                                                                                                                                                                                                                                                                        # ---------------------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                          build:
                                                                                                                                                                                                                                                                                                                                                                                                              needs: changes
                                                                                                                                                                                                                                                                                                                                                                                                                  runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                      permissions:
                                                                                                                                                                                                                                                                                                                                                                                                                            contents: read
                                                                                                                                                                                                                                                                                                                                                                                                                                  packages: write
                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                      strategy:
                                                                                                                                                                                                                                                                                                                                                                                                                                            fail-fast: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                  matrix:
                                                                                                                                                                                                                                                                                                                                                                                                                                                          include:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: admin-portal
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                context: apps/admin-portal
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            changed: ${{ needs.changes.outputs.admin-portal }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: client-portal
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  context: apps/client-portal
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              changed: ${{ needs.changes.outputs.client-portal }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: designer-portal
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    context: apps/designer-portal
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                changed: ${{ needs.changes.outputs.designer-portal }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: aesthete-engine
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      context: services/aesthete-engine
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  changed: ${{ needs.changes.outputs.aesthete-engine }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: media
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        context: services/media
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    changed: ${{ needs.changes.outputs.media }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: orders
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          context: services/orders
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      changed: ${{ needs.changes.outputs.orders }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: projects
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            context: services/projects
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        changed: ${{ needs.changes.outputs.projects }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # Skip unchanged services on push; build all on workflow_dispatch
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: >
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      github.event_name == 'workflow_dispatch' ||
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            matrix.changed == 'true'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Checkout
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # Set up QEMU for multi-arch builds (linux/amd64 + linux/arm64)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Set up QEMU
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  uses: docker/setup-qemu-action@v3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Set up Docker Buildx
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uses: docker/setup-buildx-action@v3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Log in to GitHub Container Registry
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              uses: docker/login-action@v3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                registry: ${{ env.REGISTRY }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          username: ${{ github.actor }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    password: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Generate tags:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                #   ghcr.io/kodeman/<service>:latest          (main branch)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      #   ghcr.io/kodeman/<service>:<sha-short>     (always)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            #   ghcr.io/kodeman/<service>:<semver>        (on version tags)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Extract Docker metadata
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          id: meta
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  uses: docker/metadata-action@v5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    images: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              tags: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          type=ref,event=branch
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      type=sha,prefix=sha-,format=short
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  type=semver,pattern={{version}}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Build and push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            uses: docker/build-push-action@v6
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              context: ${{ matrix.context }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        platforms: linux/amd64,linux/arm64
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  push: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            tags: ${{ steps.meta.outputs.tags }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      labels: ${{ steps.meta.outputs.labels }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Use GitHub Actions cache to speed up subsequent builds
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          cache-from: type=gha,scope=${{ matrix.name }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    cache-to: type=gha,mode=max,scope=${{ matrix.name }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              build-args: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      GIT_SHA=${{ github.sha }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Image digest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: echo "Pushed ${{ matrix.name }} → ${{ steps.build-push.outputs.digest }}"
