name: Build & Publish Docker Images to GHCR

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-portal/**'
      - 'apps/client-portal/**'
      - 'apps/designer-portal/**'
      - 'services/media/**'
      - 'services/orders/**'
      - 'services/projects/**'
      - 'packages/**'
      - 'infra/Dockerfile.*'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Specific service to build (leave empty to build all)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/kodeman

jobs:
  # ---------------------------------------------------------------------------
  # Detect which apps/services changed (for push-triggered runs)
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      admin-portal: ${{ steps.filter.outputs.admin-portal }}
      client-portal: ${{ steps.filter.outputs.client-portal }}
      designer-portal: ${{ steps.filter.outputs.designer-portal }}
      media: ${{ steps.filter.outputs.media }}
      orders: ${{ steps.filter.outputs.orders }}
      projects: ${{ steps.filter.outputs.projects }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin-portal:
              - 'apps/admin-portal/**'
              - 'packages/**'
            client-portal:
              - 'apps/client-portal/**'
              - 'packages/**'
            designer-portal:
              - 'apps/designer-portal/**'
              - 'packages/**'
            media:
              - 'services/media/**'
              - 'packages/types/**'
              - 'packages/utils/**'
              - 'packages/cache/**'
              - 'packages/auth/**'
            orders:
              - 'services/orders/**'
              - 'packages/types/**'
              - 'packages/utils/**'
              - 'packages/cache/**'
              - 'packages/auth/**'
            projects:
              - 'services/projects/**'
              - 'packages/types/**'
              - 'packages/utils/**'
              - 'packages/cache/**'
              - 'packages/auth/**'

  # ---------------------------------------------------------------------------
  # Build Next.js apps
  # ---------------------------------------------------------------------------
  build-nextjs:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: admin-portal
            app_url: https://admin.patina.cloud
            changed: ${{ needs.changes.outputs.admin-portal }}
          - name: client-portal
            app_url: https://client.patina.cloud
            changed: ${{ needs.changes.outputs.client-portal }}
          - name: designer-portal
            app_url: https://app.patina.cloud
            changed: ${{ needs.changes.outputs.designer-portal }}

    # Skip unchanged services on push; build all on workflow_dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      matrix.changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.nextjs
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          build-args: |
            APP_NAME=${{ matrix.name }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ matrix.app_url }}

  # ---------------------------------------------------------------------------
  # Build NestJS services
  # ---------------------------------------------------------------------------
  build-nestjs:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: orders
            changed: ${{ needs.changes.outputs.orders }}
          - name: media
            changed: ${{ needs.changes.outputs.media }}
          - name: projects
            changed: ${{ needs.changes.outputs.projects }}

    if: >
      github.event_name == 'workflow_dispatch' ||
      matrix.changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.nestjs
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          build-args: |
            SERVICE_NAME=${{ matrix.name }}
