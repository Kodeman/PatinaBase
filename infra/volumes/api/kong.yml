# =============================================================================
# KONG API GATEWAY CONFIGURATION FOR SUPABASE
# File: volumes/api/kong.yml
# =============================================================================
#
# This configuration routes API requests to the appropriate Supabase services
# and handles authentication via API keys.
# =============================================================================

_format_version: "2.1"
_transform: true

# =============================================================================
# CONSUMERS - API Key Authentication
# =============================================================================
consumers:
  - username: DASHBOARD
  - username: anon
    keyauth_credentials:
      - key: ${SUPABASE_ANON_KEY}
  - username: service_role
    keyauth_credentials:
      - key: ${SUPABASE_SERVICE_KEY}

# =============================================================================
# ACCESS CONTROL LISTS
# =============================================================================
acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

# =============================================================================
# SERVICES
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # AUTH SERVICE - GoTrue Authentication
  # ---------------------------------------------------------------------------
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors

  - name: auth-v1-open-callback
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors

  - name: auth-v1-open-authorize
    url: http://auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors

  - name: auth-v1
    _comment: "GoTrue: /auth/v1/* -> http://auth:9999/*"
    url: http://auth:9999
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  # ---------------------------------------------------------------------------
  # REST SERVICE - PostgREST
  # ---------------------------------------------------------------------------
  - name: rest-v1
    _comment: "PostgREST: /rest/v1/* -> http://rest:3000/*"
    url: http://rest:3000
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  # ---------------------------------------------------------------------------
  # REALTIME SERVICE - WebSocket Subscriptions
  # ---------------------------------------------------------------------------
  - name: realtime-v1-ws
    _comment: "Realtime: /realtime/v1/* -> ws://realtime:4000/socket/*"
    url: http://realtime:4000/socket
    routes:
      - name: realtime-v1-ws
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  # ---------------------------------------------------------------------------
  # STORAGE SERVICE - File Storage
  # ---------------------------------------------------------------------------
  - name: storage-v1
    _comment: "Storage: /storage/v1/* -> http://storage:5000/*"
    url: http://storage:5000
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  # ---------------------------------------------------------------------------
  # FUNCTIONS SERVICE - Edge Functions (Deno)
  # ---------------------------------------------------------------------------
  - name: functions-v1
    _comment: "Functions: /functions/v1/* -> http://functions:9000/*"
    url: http://functions:9000
    routes:
      - name: functions-v1-all
        strip_path: true
        paths:
          - /functions/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  # ---------------------------------------------------------------------------
  # META SERVICE - PostgreSQL Meta API (for Studio)
  # ---------------------------------------------------------------------------
  - name: meta
    _comment: "pg_meta"
    url: http://meta:8080
    routes:
      - name: meta-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: key-auth
        config:
          hide_credentials: false

  # ---------------------------------------------------------------------------
  # DASHBOARD SERVICE - Supabase Studio
  # ---------------------------------------------------------------------------
  - name: dashboard
    _comment: "Dashboard"
    url: http://studio:3000
    routes:
      - name: dashboard-all
        strip_path: true
        paths:
          - /
    plugins:
      - name: cors
      - name: basic-auth
        config:
          hide_credentials: true

# =============================================================================
# PLUGINS - Global Configuration
# =============================================================================
plugins:
  - name: cors
    config:
      origins:
        - https://app.patina.cloud
        - https://admin.patina.cloud
        - https://patina.cloud
        - http://localhost:3000
        - http://localhost:3001
        - http://localhost:3002
      methods:
        - GET
        - HEAD
        - PUT
        - PATCH
        - POST
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - apikey
        - X-Client-Info
        - X-Requested-With
        - Prefer
        - Range
      exposed_headers:
        - Content-Range
        - Range
        - X-Total-Count
      credentials: true
      max_age: 3600
