# =============================================================================
# PATINA BACKEND SERVICES FOR COOLIFY
# Deploy this as a separate "Docker Compose" resource in Coolify
# =============================================================================
#
# COOLIFY SETUP INSTRUCTIONS:
# 1. In your "Patina Infrastructure" Project
# 2. Add Resource -> Docker Compose
# 3. Name it "Patina Backend Services"
# 4. Configure environment variables in Coolify UI
# 5. Connect to patina_network (same network as Supabase)
#
# SERVICES:
# - Redis: Caching & BullMQ job queues
# - MinIO: S3-compatible object storage (for media service)
# - Orders: Stripe payments, EasyPost shipping (NestJS)
# - Media: Image processing, S3 storage, phash dedup (NestJS)
# - Projects: Real-time collaboration, WebSocket (NestJS)
# =============================================================================

services:
  # ===========================================================================
  # REDIS - Caching, BullMQ Queues, Session Management
  # ===========================================================================
  redis:
    container_name: patina-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - patina_network

  # ===========================================================================
  # MINIO - S3-compatible Object Storage (for media service)
  # ===========================================================================
  minio:
    container_name: patina-minio
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-patina}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-https://storage-admin.patina.cloud}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "9000:9000"   # MinIO API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    networks:
      - patina_network

  # ===========================================================================
  # ORDERS SERVICE - Stripe Payments, EasyPost Shipping, Fulfillment
  # NestJS microservice (port 3015)
  # ===========================================================================
  orders:
    container_name: patina-orders
    build:
      context: ..
      dockerfile: infra/Dockerfile.nestjs
      args:
        SERVICE_NAME: orders
    image: patina-orders:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3015/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      NODE_ENV: production
      PORT: 3015
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?schema=svc_orders
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      EASYPOST_API_KEY: ${EASYPOST_API_KEY}
    ports:
      - "3015:3015"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - patina_network

  # ===========================================================================
  # MEDIA SERVICE - Image Processing, S3 Storage, Phash Dedup
  # NestJS microservice (port 3014)
  # ===========================================================================
  media:
    container_name: patina-media
    build:
      context: ..
      dockerfile: infra/Dockerfile.nestjs
      args:
        SERVICE_NAME: media
    image: patina-media:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3014/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      NODE_ENV: production
      PORT: 3014
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?schema=svc_media
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      # Storage: Cloudflare R2 (production) — falls back to S3/MinIO if STORAGE_PROVIDER=S3
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-R2}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      STORAGE_BUCKET_RAW: ${R2_BUCKET_RAW:-patina-raw}
      STORAGE_BUCKET_PROCESSED: ${R2_BUCKET_PROCESSED:-patina-processed}
      STORAGE_BUCKET_THUMBNAILS: ${R2_BUCKET_THUMBNAILS:-patina-thumbnails}
      STORAGE_BUCKET_ARCHIVE: ${R2_BUCKET_ARCHIVE:-patina-archive}
      CDN_PROVIDER: ${CDN_PROVIDER:-cloudflare}
      CDN_DOMAIN: ${CDN_DOMAIN:-cdn.patina.cloud}
      CF_API_TOKEN: ${CF_API_TOKEN}
      # Legacy S3/MinIO (kept for local dev fallback)
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-patina}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-patina-media}
      S3_REGION: ${S3_REGION:-us-east-1}
    ports:
      - "3014:3014"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - patina_network

  # ===========================================================================
  # PROJECTS SERVICE - Real-time Collaboration, WebSocket, State Machines
  # NestJS microservice (port 3016)
  # ===========================================================================
  projects:
    container_name: patina-projects
    build:
      context: ..
      dockerfile: infra/Dockerfile.nestjs
      args:
        SERVICE_NAME: projects
    image: patina-projects:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3016/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      NODE_ENV: production
      PORT: 3016
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?schema=svc_projects
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3016:3016"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - patina_network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  patina_network:
    external: true
