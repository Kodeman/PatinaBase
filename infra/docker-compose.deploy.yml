# =============================================================================
# PATINA DEPLOYMENT COMPOSE — Pre-built images from GHCR
# =============================================================================
#
# This file replaces docker-compose.services.yml + docker-compose.frontend.yml
# for production deployment on Coolify. All services use pre-built images from
# GitHub Container Registry instead of building from source.
#
# Images are built locally via: ./infra/build-and-push.sh
# =============================================================================

services:
  # ===========================================================================
  # REDIS - Caching, BullMQ Queues, Session Management
  # ===========================================================================
  redis:
    container_name: patina-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - patina_network

  # ===========================================================================
  # MINIO - S3-compatible Object Storage (for media service)
  # ===========================================================================
  minio:
    container_name: patina-minio
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-patina}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-https://storage-admin.patina.cloud}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - patina_network

  # ===========================================================================
  # ORDERS SERVICE — Stripe Payments, EasyPost Shipping
  # ===========================================================================
  orders:
    container_name: patina-orders
    image: ghcr.io/kodeman/orders:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3015/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      NODE_ENV: production
      PORT: 3015
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?schema=svc_orders
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      EASYPOST_API_KEY: ${EASYPOST_API_KEY}
    ports:
      - "3015:3015"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - patina_network

  # ===========================================================================
  # MEDIA SERVICE — Image Processing, S3 Storage
  # ===========================================================================
  media:
    container_name: patina-media
    image: ghcr.io/kodeman/media:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3014/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      NODE_ENV: production
      PORT: 3014
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?schema=svc_media
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-patina}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-patina-media}
      S3_REGION: ${S3_REGION:-us-east-1}
    ports:
      - "3014:3014"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - patina_network

  # ===========================================================================
  # PROJECTS SERVICE — Real-time Collaboration, WebSocket
  # ===========================================================================
  projects:
    container_name: patina-projects
    image: ghcr.io/kodeman/projects:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3016/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      NODE_ENV: production
      PORT: 3016
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?schema=svc_projects
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3016:3016"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - patina_network

  # ===========================================================================
  # DESIGNER PORTAL — app.patina.cloud
  # ===========================================================================
  designer-portal:
    container_name: patina-designer-portal
    image: ghcr.io/kodeman/designer-portal:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://api.patina.cloud}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ORDERS_SERVICE_URL: http://orders:3015
      MEDIA_SERVICE_URL: http://media:3014
      PROJECTS_SERVICE_URL: http://projects:3016
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.designer-portal.rule=Host(`app.patina.cloud`)"
      - "traefik.http.routers.designer-portal.entrypoints=websecure"
      - "traefik.http.routers.designer-portal.tls=true"
      - "traefik.http.services.designer-portal.loadbalancer.server.port=3000"
    networks:
      - patina_network

  # ===========================================================================
  # ADMIN PORTAL — admin.patina.cloud
  # ===========================================================================
  admin-portal:
    container_name: patina-admin-portal
    image: ghcr.io/kodeman/admin-portal:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://api.patina.cloud}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ORDERS_SERVICE_URL: http://orders:3015
      MEDIA_SERVICE_URL: http://media:3014
    ports:
      - "3001:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-portal.rule=Host(`admin.patina.cloud`)"
      - "traefik.http.routers.admin-portal.entrypoints=websecure"
      - "traefik.http.routers.admin-portal.tls=true"
      - "traefik.http.services.admin-portal.loadbalancer.server.port=3000"
    networks:
      - patina_network

  # ===========================================================================
  # CLIENT PORTAL — client.patina.cloud
  # ===========================================================================
  client-portal:
    container_name: patina-client-portal
    image: ghcr.io/kodeman/client-portal:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://api.patina.cloud}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ORDERS_SERVICE_URL: http://orders:3015
      MEDIA_SERVICE_URL: http://media:3014
      PROJECTS_SERVICE_URL: http://projects:3016
    ports:
      - "3002:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client-portal.rule=Host(`client.patina.cloud`)"
      - "traefik.http.routers.client-portal.entrypoints=websecure"
      - "traefik.http.routers.client-portal.tls=true"
      - "traefik.http.services.client-portal.loadbalancer.server.port=3000"
    networks:
      - patina_network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  patina_network:
    external: true
