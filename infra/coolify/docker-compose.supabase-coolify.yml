      KONG_UPSTREAM_KEEPALIVE_POOL_SIZE: '60'
      KONG_UPSTREAM_KEEPALIVE_MAX_REQUESTS: '1000'
      KONG_CONFIG_B64: 
      COOLIFY_RESOURCE_UUID: es8w8g0c00og4gsgg0k8w8o8
      COOLIFY_CONTAINER_NAME: kong-es8w8g0c00og4gsgg0k8w8o8
      SERVICE_NAME_DB: db
