services:
  db:
    image: 'supabase/postgres:15.1.1.78'
    restart: unless-stopped
    healthcheck:
      test: 'pg_isready -U postgres -h localhost'
      interval: 5s
      timeout: 5s
      retries: 10
    entrypoint:
      - bash
      - -c
      - |
        # Run the original docker-entrypoint with postgres command in background
        /usr/local/bin/docker-entrypoint.sh "$$@" &
        PG_PID=$$!
        # Wait for postgres to be ready
        until pg_isready -U postgres -h localhost 2>/dev/null; do sleep 1; done
        echo "=== Syncing service user passwords ==="
        psql -U postgres -c "ALTER USER supabase_auth_admin WITH PASSWORD '$${POSTGRES_PASSWORD}';" 2>&1 || true
        psql -U postgres -c "ALTER USER supabase_storage_admin WITH PASSWORD '$${POSTGRES_PASSWORD}';" 2>&1 || true
        psql -U postgres -c "ALTER USER authenticator WITH PASSWORD '$${POSTGRES_PASSWORD}';" 2>&1 || true
        psql -U postgres -c "ALTER USER supabase_admin WITH PASSWORD '$${POSTGRES_PASSWORD}';" 2>&1 || true
        echo "=== Password sync complete ==="
        wait $$PG_PID
      - --
    command:
      - postgres
      - '-c'
      - "listen_addresses=*"
      - '-c'
      - wal_level=logical
      - '-c'
      - max_connections=100
      - '-c'
      - shared_buffers=512MB
      - '-c'
      - effective_cache_size=1536MB
      - '-c'
      - work_mem=32MB
      - '-c'
      - maintenance_work_mem=256MB
      - '-c'
      - random_page_cost=1.1
      - '-c'
      - effective_io_concurrency=200
      - '-c'
      - checkpoint_completion_target=0.9
      - '-c'
      - wal_buffers=16MB
      - '-c'
      - default_statistics_target=100
      - '-c'
      - min_wal_size=1GB
      - '-c'
      - max_wal_size=4GB
      - '-c'
      - huge_pages=try
      - '-c'
      - log_min_duration_statement=1000
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: '${POSTGRES_PORT:-5432}'
      POSTGRES_PORT: '${POSTGRES_PORT:-5432}'
      PGPASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      PGDATABASE: '${POSTGRES_DB:-postgres}'
      POSTGRES_DB: '${POSTGRES_DB:-postgres}'
      JWT_SECRET: '${JWT_SECRET}'
      JWT_EXP: '${JWT_EXPIRY:-3600}'
      COOLIFY_RESOURCE_UUID: es8w8g0c00og4gsgg0k8w8o8
      COOLIFY_CONTAINER_NAME: db-es8w8g0c00og4gsgg0k8w8o8
      SERVICE_NAME_DB: db
      SERVICE_NAME_KONG: kong
      SERVICE_NAME_AUTH: auth
      SERVICE_NAME_REALTIME: realtime
      SERVICE_NAME_REST: rest
      SERVICE_NAME_STORAGE: storage
      SERVICE_NAME_IMGPROXY: imgproxy
      SERVICE_NAME_STUDIO: studio
      SERVICE_NAME_META: meta
      SERVICE_NAME_ANALYTICS: analytics
    volumes:
      - 'es8w8g0c00og4gsgg0k8w8o8_db-data:/var/lib/postgresql/data'
    ports:
      - '5433:5432'
    container_name: db-es8w8g0c00og4gsgg0k8w8o8
    labels:
      - coolify.managed=true
      - coolify.version=4.0.0-beta.463
      - coolify.serviceId=12
      - coolify.type=service
      - coolify.name=db-es8w8g0c00og4gsgg0k8w8o8
      - coolify.resourceName=supabase-stack
      - coolify.projectName=strata
      - coolify.serviceName=db
      - coolify.environmentName=production
      - coolify.pullRequestId=0
      - coolify.service.subId=8
      - coolify.service.subType=database
      - coolify.service.subName=db
    networks:
      es8w8g0c00og4gsgg0k8w8o8: null
    env_file:
      - .env
  kong:
    image: 'kong:2.8.1'
    restart: unless-stopped
    entrypoint:
      - bash
      - '-c'
      - 'echo "$$KONG_CONFIG_B64" | base64 -d > /home/kong/kong.yml && /docker-entrypoint.sh kong docker-start'
    environment:
