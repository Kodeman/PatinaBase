# =============================================================================
# PATINA INFRASTRUCTURE FOR COOLIFY
# Deploy as a "Docker Compose" resource in Coolify alongside the Supabase stack.
# Contains only Redis + MinIO — NestJS backends are deployed as individual apps.
# =============================================================================

services:
  # ===========================================================================
  # REDIS - Caching, BullMQ Queues, Session Management
  # ===========================================================================
  redis:
    container_name: patina-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      es8w8g0c00og4gsgg0k8w8o8:
        aliases:
          - patina-redis
      vo0gs8wg0s0o8wcgsg8c0o8k: null

  # ===========================================================================
  # MINIO - S3-compatible Object Storage (for media service)
  # ===========================================================================
  minio:
    container_name: patina-minio
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-patina}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-https://storage-admin.patina.cloud}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "9000:9000"   # MinIO API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    networks:
      es8w8g0c00og4gsgg0k8w8o8:
        aliases:
          - patina-minio
      vo0gs8wg0s0o8wcgsg8c0o8k: null

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  es8w8g0c00og4gsgg0k8w8o8:
    external: true
  vo0gs8wg0s0o8wcgsg8c0o8k:
    external: true
