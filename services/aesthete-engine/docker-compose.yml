version: '3.8'

services:
  aesthete-engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://patina:patina@postgres:5432/patina
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - LOG_LEVEL=DEBUG
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    depends_on:
      - postgres
      - redis
      - mlflow
    networks:
      - aesthete-net

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=patina
      - POSTGRES_PASSWORD=patina
      - POSTGRES_DB=patina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aesthete-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aesthete-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    ports:
      - "5000:5000"
    environment:
      - BACKEND_STORE_URI=postgresql://patina:patina@postgres:5432/mlflow
      - DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      - postgres
    command: >
      mlflow server
      --backend-store-uri postgresql://patina:patina@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    networks:
      - aesthete-net

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - aesthete-net

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  opensearch_data:

networks:
  aesthete-net:
    driver: bridge
