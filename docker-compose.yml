# =============================================================================
# PATINA LOCAL DEVELOPMENT STACK
# =============================================================================
#
# Usage:
#   docker compose up -d          # Start all infrastructure
#   docker compose down            # Stop all
#   docker compose down -v         # Stop and delete data
#
# This starts infrastructure only. Application services run via pnpm:
#   pnpm dev:minimal               # Designer portal + 3 NestJS services
#   pnpm dev:designer              # Designer portal focused
#   pnpm dev:admin                 # Admin portal focused
#   pnpm dev:client                # Client portal focused
#
# Supabase runs separately via:
#   pnpm supabase:start            # Start Supabase (Postgres, Auth, Realtime, Storage)
#   pnpm supabase:stop             # Stop Supabase
# =============================================================================

version: "3.8"

services:
  # ===========================================================================
  # REDIS - Caching, BullMQ queues, session management
  # ===========================================================================
  redis:
    container_name: patina-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass patina_redis_password --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "patina_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ===========================================================================
  # MINIO - S3-compatible object storage (for media service)
  # ===========================================================================
  minio:
    container_name: patina-minio
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: patina_minio
      MINIO_ROOT_PASSWORD: patina_minio_password
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "9000:9000"   # MinIO API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data

  # ===========================================================================
  # MAILHOG - Local email testing (catches all SMTP)
  # ===========================================================================
  mailhog:
    container_name: patina-mailhog
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local
